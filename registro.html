<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registro SportClub</title>

    <link rel="stylesheet" href="assets/css/style_registro.css">

</head>

<body>

<main class="contenedor">

    <section class="login-card">

        <header class="logo">

            <img 
                src="assets/img/logo.png" 
                alt="Logo SportClub"
            >

        </header>

            <h1>Registro</h1>

            <form>

                <!-- Nombre -->
                <div class="grupo-input">

                    <label for="nombre">
                        Nombre Completo
                    </label>

                    <input 
                        type="text"
                        id="nombre"
                        placeholder="Ingresa tu nombre"
                    >

                </div>

                <!-- Fecha de nacimiento -->
                <div class="grupo-input">

                    <label for="fecha">
                        Fecha de Nacimiento
                    </label>

                    <input 
                        type="date"
                        id="fecha"
                    >

                </div>

                <!-- Correo -->
                <div class="grupo-input">

                    <label for="correo">
                        Correo Electrónico
                    </label>

                    <input 
                        type="email"
                        id="correo"
                        placeholder="Ingresa tu correo"
                    >

                </div>

                <!-- Contraseña -->
                <div class="grupo-input">

                    <label for="password">
                        Contraseña
                    </label>

                    <input 
                        type="password"
                        id="password"
                        placeholder="Ingresa tu contraseña"
                    >

                </div>

                <!-- Actividades -->
                <div class="grupo-input">

                    <label for="actividad">
                        Actividades de Interés
                    </label>

                    <select id="actividad">

                        <option>
                            Selecciona una actividad
                        </option>

                        <option>
                            Gimnasio
                        </option>

                        <option>
                            Running
                        </option>

                        <option>
                            Yoga
                        </option>

                        <option>
                            Crossfit
                        </option>

                        <option>
                            Natación
                        </option>

                        <option>
                            Ciclismo
                        </option>

                    </select>

                </div>

                <!-- Objetivo -->
                <div class="grupo-input">

                    <label for="objetivo">
                        Objetivo
                    </label>

                    <select id="objetivo">

                        <option>
                            Selecciona tu objetivo
                        </option>

                        <option>
                            Bajar de peso
                        </option>

                        <option>
                            Mantenerse activo
                        </option>

                        <option>
                            Ganar masa muscular
                        </option>

                        <option>
                            Mejorar condición física
                        </option>

                        <option>
                            Mejorar salud
                        </option>

                    </select>

                </div>

                <!-- Botón -->
                <button type="submit">

                    Registrarse

                </button>

            </form>

            <!-- Link -->
            <nav class="links">

                <a href="index.html">

                    ¿Ya tienes una cuenta?

                </a>

            </nav>

        </section>

    </main>

</body>
</html>
